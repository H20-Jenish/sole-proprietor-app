version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sp_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: America/Toronto
      PGTZ: America/Toronto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sp_network

  backend:
    build: ./backend
    container_name: sp_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
      TZ: America/Toronto
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode===200?0:1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sp_network

  frontend:
    build: ./frontend
    container_name: sp_frontend
    environment:
      TZ: America/Toronto
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sp_network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: sp_nginx
    environment:
      TZ: America/Toronto
    ports:
      - "8002:80"
    volumes:
      - ./frontend/nginx.proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - sp_network

volumes:
  postgres_data:
  uploads:
  backups:

networks:
  sp_network:
    driver: bridge